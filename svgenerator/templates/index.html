<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SV Listener – Phasors</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent-u: #58a6ff;
      --accent-i: #f85149;
      --ok: #3fb950;
      --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      font-size: 14px;
    }
    h1 { font-size: 1.2rem; margin: 0 0 16px 0; color: var(--muted); }
    .layout {
      display: grid;
      grid-template-columns: 1fr minmax(380px, 420px);
      gap: 20px;
      max-width: 1400px;
    }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .panel h2 { font-size: 0.85rem; margin: 0 0 12px 0; color: var(--muted);  }
    .phasors-row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .phasor-svg {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px;
    }
    .phasor-svg svg { display: block; }
    .phasors-section { display: flex; flex-direction: column; gap: 0; }
    .sinusoids-row { display: flex; gap: 24px; width: 100%; }
    .sinusoids-row .panel { flex: 1; min-width: 0; }
    .sinusoids-row svg { display: block; width: 100%; height: auto; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stats-grid.cols-first { grid-auto-flow: column; grid-template-rows: auto auto auto; }
    .stat { display: flex; justify-content: space-between; gap: 16px; min-width: 0; }
    .stat-value { font-variant-numeric: tabular-nums; min-width: 0; text-align: right; }
    .stat-label { color: var(--muted); }
    .stat-value { font-variant-numeric: tabular-nums; }
    .config-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .config-form label { display: flex; flex-direction: column; gap: 4px; }
    .config-form input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: 4px; }
    .config-form button { grid-column: 1 / -1; padding: 8px; background: var(--accent-u); color: var(--bg); border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .config-form button:hover { opacity: 0.9; }
    .svid-badge { display: inline-block; background: var(--accent-u); color: var(--bg); padding: 4px 10px; border-radius: 4px; font-weight: 600; margin-bottom: 12px; }
    .status { color: var(--muted); font-size: 0.9rem; }
    .status.waiting { color: var(--warn); }
    .status.ok { color: var(--ok); }
    .svids-list { list-style: none; padding: 0; margin: 0; }
    .svids-list li { padding: 4px 0; border-bottom: 1px solid var(--border); }
    .svids-list li:last-child { border: none; }
    .svid-badge { cursor: pointer; }
    .svid-badge:hover { opacity: 0.9; }
    .btn-stop { padding: 4px 12px; background: var(--border); color: var(--text); border: 1px solid var(--muted); border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-stop:hover { background: var(--muted); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; min-width: 320px; max-width: 90vw; }
    .modal h2 { margin: 0 0 16px 0; font-size: 1rem; color: var(--muted); }
    .modal-svids { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
    .modal-svids li { padding: 10px 12px; cursor: pointer; border-radius: 4px; border-bottom: 1px solid var(--border); }
    .modal-svids li:hover { background: var(--bg); }
    .modal-svids li.selected { background: var(--accent-u); color: var(--bg); }
    .modal-svids li:last-child { border-bottom: none; }
    .modal-close { margin-top: 16px; padding: 8px 16px; background: var(--border); color: var(--text); border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>SV Listener – Phasors U & I</h1>
  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>Choisir un svID</h2>
      <ul class="modal-svids" id="modal-svids"></ul>
      <button class="modal-close" id="modal-close">Fermer</button>
    </div>
  </div>
  <div id="root">
    <div class="panel"><p class="status waiting">Chargement...</p></div>
  </div>

  <script>
    const API = '/api';
    let refreshTimer = null;
    let configCache = {};

    async function fetchJson(path) {
      const r = await fetch(API + path);
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    }

    function drawPhasorCircle(svgId, phasors, label, color) {
      const R = 120;
      const cx = R + 20;
      const cy = R + 20;
      const maxMag = Math.max(...phasors.map(p => p[0]), 1);
      const scale = (R - 15) / maxMag;

      const parts = [];
      parts.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#30363d" stroke-width="1"/>`);
      for (let i = 0; i < 3; i++) {
        const a = -i * 120 * Math.PI / 180;
        const x = cx + R * Math.cos(a);
        const y = cy - R * Math.sin(a);
        parts.push(`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#30363d" stroke-width="0.5"/>`);
      }
      const labels = ['A', 'B', 'C'];
      phasors.forEach((p, i) => {
        const [mag, phaseRad] = p;
        const len = mag * scale;
        const dx = len * Math.cos(phaseRad);
        const dy = -len * Math.sin(phaseRad);
        const ex = cx + dx;
        const ey = cy + dy;
        const angle = Math.atan2(-dy, dx);
        const arrLen = 8;
        const ax = ex - arrLen * Math.cos(angle);
        const ay = ey + arrLen * Math.sin(angle);
        parts.push(`<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="${color}" stroke-width="3"/>`);
        parts.push(`<polygon points="${ex},${ey} ${ax+arrLen*0.5*Math.cos(angle-Math.PI/2)},${ay-arrLen*0.5*Math.sin(angle-Math.PI/2)} ${ax+arrLen*0.5*Math.cos(angle+Math.PI/2)},${ay-arrLen*0.5*Math.sin(angle+Math.PI/2)}" fill="${color}"/>`);
        const tx = cx + (R + 12) * Math.cos(-i * 120 * Math.PI / 180);
        const ty = cy - (R + 12) * Math.sin(-i * 120 * Math.PI / 180);
        parts.push(`<text x="${tx}" y="${ty}" fill="${color}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold">${labels[i]}</text>`);
      });
      parts.push(`<text x="${cx}" y="${cy - R - 8}" fill="#8b949e" text-anchor="middle" font-size="11">${label}</text>`);

      const svg = document.getElementById(svgId);
      if (svg) {
        svg.innerHTML = parts.join('');
        svg.setAttribute('viewBox', `0 0 ${2*(R+20)} ${2*(R+20)}`);
      }
    }

    function drawSinusoids(svgId, phasors, colors, unit) {
      const w = 280, h = 130, padding = { top: 8, right: 36, bottom: 22, left: 42 };
      const graphW = w - padding.left - padding.right;
      const graphH = h - padding.top - padding.bottom;
      const gx = padding.left;
      const gy = padding.top;
      const cx = padding.left + graphW / 2;
      const cy = padding.top + graphH / 2;
      const maxMag = Math.max(...phasors.map(p => p[0]), 1);
      const ampScale = (graphH / 2 - 2) / maxMag;
      const cycles = 2;
      const pts = 200;
      const fmt = (v) => Math.abs(v) >= 100 ? v.toFixed(0) : (Math.abs(v) >= 1 ? v.toFixed(1) : v.toFixed(2));

      const parts = [];
      parts.push(`<line x1="${gx}" y1="${gy}" x2="${gx}" y2="${h - padding.bottom}" stroke="#8b949e" stroke-width="1"/>`);
      parts.push(`<line x1="${gx}" y1="${h - padding.bottom}" x2="${w - padding.right}" y2="${h - padding.bottom}" stroke="#8b949e" stroke-width="1"/>`);
      parts.push(`<line x1="${gx}" y1="${cy}" x2="${w - padding.right}" y2="${cy}" stroke="#30363d" stroke-width="0.5"/>`);
      parts.push(`<text x="${gx - 6}" y="${gy + 4}" fill="#8b949e" font-size="9" text-anchor="end">${fmt(maxMag)}</text>`);
      parts.push(`<text x="${gx - 6}" y="${cy + 4}" fill="#8b949e" font-size="9" text-anchor="end">0</text>`);
      parts.push(`<text x="${gx - 6}" y="${h - padding.bottom + 4}" fill="#8b949e" font-size="9" text-anchor="end">${fmt(-maxMag)}</text>`);
      for (let i = 0; i <= cycles * 4; i++) {
        const tx = gx + (i / (cycles * 4)) * graphW;
        const deg = Math.round((i / (cycles * 4)) * cycles * 360);
        parts.push(`<line x1="${tx}" y1="${cy}" x2="${tx}" y2="${h - padding.bottom}" stroke="#30363d" stroke-width="0.3"/>`);
        if (i % 2 === 0) parts.push(`<text x="${tx}" y="${h - padding.bottom + 14}" fill="#8b949e" font-size="8" text-anchor="middle">${deg}°</text>`);
      }
      const labels = ['A', 'B', 'C'];
      phasors.forEach((p, idx) => {
        const [mag, phaseRad] = p;
        const path = [];
        for (let i = 0; i <= pts; i++) {
          const theta = (i / pts) * cycles * 2 * Math.PI;
          const y = mag * Math.cos(theta + phaseRad);
          const x = gx + (i / pts) * graphW;
          const sy = cy - y * ampScale;
          path.push(`${i === 0 ? 'M' : 'L'} ${x} ${sy}`);
        }
        parts.push(`<path d="${path.join(' ')}" fill="none" stroke="${colors[idx]}" stroke-width="1.5"/>`);
        parts.push(`<text x="${w - padding.right - 4}" y="${gy + 10 + idx * 11}" fill="${colors[idx]}" font-size="9">${labels[idx]}</text>`);
      });
      const svg = document.getElementById(svgId);
      if (svg) {
        svg.innerHTML = parts.join('');
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      }
    }

    function updateDataValues(data) {
      const badge = document.getElementById('svid-badge');
      if (badge) badge.textContent = 'svID: ' + (data.svid || '');
      const hasPhasors = data.u_arrows && data.u_arrows.length === 3;
      const uArrows = hasPhasors ? data.u_arrows : [[0,0],[0,0],[0,0]];
      const iArrows = hasPhasors ? data.i_arrows : [[0,0],[0,0],[0,0]];
      drawPhasorCircle('svg-u', uArrows, 'U (V)', '#58a6ff');
      drawPhasorCircle('svg-i', iArrows, 'I (A)', '#f85149');
      drawSinusoids('svg-sinus-u', uArrows, ['#58a6ff', '#79c0ff', '#a5d6ff'], 'V');
      drawSinusoids('svg-sinus-i', iArrows, ['#f85149', '#ff7b72', '#ffa198'], 'A');
      const set = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };
      set('stat-va', (data.u_mags?.[0] ?? 0).toFixed(0) + ' V');
      set('stat-vb', (data.u_mags?.[1] ?? 0).toFixed(0) + ' V');
      set('stat-vc', (data.u_mags?.[2] ?? 0).toFixed(0) + ' V');
      set('stat-ia', (data.i_mags?.[0] ?? 0).toFixed(2) + ' A');
      set('stat-ib', (data.i_mags?.[1] ?? 0).toFixed(2) + ' A');
      set('stat-ic', (data.i_mags?.[2] ?? 0).toFixed(2) + ' A');
      set('stat-pha', data.phase_shifts ? data.phase_shifts[0].toFixed(1) + '°' : '-');
      set('stat-phb', data.phase_shifts ? data.phase_shifts[1].toFixed(1) + '°' : '-');
      set('stat-phc', data.phase_shifts ? data.phase_shifts[2].toFixed(1) + '°' : '-');
      set('stat-delay-all', data.delay_all ?? '-');
      set('stat-delay-win', data.delay_win ?? '-');
      set('stat-sync-all', data.sync_all ?? '-');
      set('stat-sync-win', data.sync_win ?? '-');
      set('stat-misses-all', String(data.misses_all ?? 0));
      set('stat-misses-win', String(data.misses_win ?? 0));
      const n = data.samples_count ?? 0;
      set('stat-samples', n >= 96 ? `${n} échantillons (DFT OK)` : `${n} échantillons (attente 96+)`);
      const w = data.window ?? 10;
      ['label-delay-win', 'label-sync-win', 'label-misses-win'].forEach(id => set(id, `Dernières ${w}s`));
    }

    function render(data) {
      const root = document.getElementById('root');
      if (!data.svid) {
        root.innerHTML = `
          <div class="panel">
            <h2>svIDs vus</h2>
            ${data.svids && data.svids.length ? `
              <ul class="svids-list" id="svids-list-clickable">
                ${data.svids.map(s => '<li data-svid="' + s.replace(/"/g, '&quot;') + '">' + s + '</li>').join('')}
              </ul>
              <p class="status">Cliquez sur un svID pour l'afficher.</p>
            ` : '<p class="status waiting">Aucun svID pour l\'instant.</p>'}
          </div>
        `;
        document.querySelectorAll('#svids-list-clickable li[data-svid]').forEach(li => {
          li.style.cursor = 'pointer';
          li.addEventListener('click', async () => {
            const svid = li.getAttribute('data-svid');
            await fetch(API + '/svid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ svid }) });
            poll();
          });
        });
        return;
      }

      const hasDataContainer = document.getElementById('data-container');
      if (hasDataContainer) {
        updateDataValues(data);
        return;
      }

      const hasPhasors = data.u_arrows && data.u_arrows.length === 3;
      const uArrows = hasPhasors ? data.u_arrows : [[0,0],[0,0],[0,0]];
      const iArrows = hasPhasors ? data.i_arrows : [[0,0],[0,0],[0,0]];
      const w = data.window ?? 10;
      const nc = data.samples_count ?? 0;
      const samplesStr = nc >= 96 ? nc + ' échantillons (DFT OK)' : nc + ' échantillons (attente 96+)';

      let html = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div class="svid-badge" id="svid-badge" title="Cliquer pour changer">svID: ${data.svid}</div>
          <button type="button" class="btn-stop" id="btn-stop" title="Revenir à la liste des flux">Arrêter</button>
        </div>
        <div class="layout" id="data-container">
          <div class="phasors-section">
            <div class="panel">
              <h2>Phasors</h2>
              <div class="phasors-row">
                <div class="phasor-svg"><svg id="svg-u" width="280" height="280"></svg></div>
                <div class="phasor-svg"><svg id="svg-i" width="280" height="280"></svg></div>
              </div>
            </div>
            <div class="sinusoids-row">
              <div class="panel">
                <h2>U (V) – sinusoïdes</h2>
                <svg id="svg-sinus-u" viewBox="0 0 280 130"></svg>
              </div>
              <div class="panel">
                <h2>I (A) – sinusoïdes</h2>
                <svg id="svg-sinus-i" viewBox="0 0 280 130"></svg>
              </div>
            </div>
          </div>
          <div class="right-panels">
            <div class="panel">
              <h2>Tensions & Courants</h2>
              <div class="stats-grid cols-first">
                <div class="stat"><span class="stat-label">Va</span><span class="stat-value" id="stat-va">${(data.u_mags?.[0] ?? 0).toFixed(0)} V</span></div>
                <div class="stat"><span class="stat-label">Vb</span><span class="stat-value" id="stat-vb">${(data.u_mags?.[1] ?? 0).toFixed(0)} V</span></div>
                <div class="stat"><span class="stat-label">Vc</span><span class="stat-value" id="stat-vc">${(data.u_mags?.[2] ?? 0).toFixed(0)} V</span></div>
                <div class="stat"><span class="stat-label">Ia</span><span class="stat-value" id="stat-ia">${(data.i_mags?.[0] ?? 0).toFixed(2)} A</span></div>
                <div class="stat"><span class="stat-label">Ib</span><span class="stat-value" id="stat-ib">${(data.i_mags?.[1] ?? 0).toFixed(2)} A</span></div>
                <div class="stat"><span class="stat-label">Ic</span><span class="stat-value" id="stat-ic">${(data.i_mags?.[2] ?? 0).toFixed(2)} A</span></div>
              </div>
              <h2 style="margin-top:16px">Déphasage U/I</h2>
              <div class="stats-grid">
                <div class="stat"><span class="stat-label">φa</span><span class="stat-value" id="stat-pha">${data.phase_shifts ? data.phase_shifts[0].toFixed(1) + '°' : '-'}</span></div>
                <div class="stat"><span class="stat-label">φb</span><span class="stat-value" id="stat-phb">${data.phase_shifts ? data.phase_shifts[1].toFixed(1) + '°' : '-'}</span></div>
                <div class="stat"><span class="stat-label">φc</span><span class="stat-value" id="stat-phc">${data.phase_shifts ? data.phase_shifts[2].toFixed(1) + '°' : '-'}</span></div>
              </div>
            </div>
            <div class="panel">
              <h2>Délai inter-paquets (µs)</h2>
              <div class="stats-grid">
                <div class="stat"><span class="stat-label">Depuis lancement</span><span class="stat-value" id="stat-delay-all">${data.delay_all ?? '-'}</span></div>
                <div class="stat"><span class="stat-label" id="label-delay-win">Dernières ${w}s</span><span class="stat-value" id="stat-delay-win">${data.delay_win ?? '-'}</span></div>
              </div>
              <h2 style="margin-top:12px">Délai seconde pile → smpCnt0 (µs)</h2>
              <div class="stats-grid">
                <div class="stat"><span class="stat-label">Depuis lancement</span><span class="stat-value" id="stat-sync-all">${data.sync_all ?? '-'}</span></div>
                <div class="stat"><span class="stat-label" id="label-sync-win">Dernières ${w}s</span><span class="stat-value" id="stat-sync-win">${data.sync_win ?? '-'}</span></div>
              </div>
              <h2 style="margin-top:12px">Misses</h2>
              <div class="stats-grid">
                <div class="stat"><span class="stat-label">Depuis lancement</span><span class="stat-value" id="stat-misses-all">${data.misses_all ?? 0}</span></div>
                <div class="stat"><span class="stat-label" id="label-misses-win">Dernières ${w}s</span><span class="stat-value" id="stat-misses-win">${data.misses_win ?? 0}</span></div>
              </div>
            </div>
            <div class="panel">
              <h2>Paramètres</h2>
              <form class="config-form" id="configForm">
                <label>
                  <span>Rafraîchissement (s)</span>
                  <input type="number" name="interval" min="0.1" step="0.1" value="${configCache.interval ?? 1}">
                </label>
                <label>
                  <span>Fenêtre stats (s)</span>
                  <input type="number" name="window" min="1" step="1" value="${configCache.window ?? 10}">
                </label>
                <button type="submit">Appliquer</button>
              </form>
            </div>
          </div>
        </div>
        <p class="status ok" style="margin-top:12px"><span id="stat-samples" title="Nombre d'échantillons (ASDUs) en buffer pour le calcul DFT. 96+ requis pour les phasors.">${samplesStr}</span></p>
      `;
      root.innerHTML = html;

      drawPhasorCircle('svg-u', uArrows, 'U (V)', '#58a6ff');
      drawPhasorCircle('svg-i', iArrows, 'I (A)', '#f85149');
      drawSinusoids('svg-sinus-u', uArrows, ['#58a6ff', '#79c0ff', '#a5d6ff'], 'V');
      drawSinusoids('svg-sinus-i', iArrows, ['#f85149', '#ff7b72', '#ffa198'], 'A');

      document.getElementById('configForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const cfg = {
          interval: parseFloat(fd.get('interval')) || 1,
          window: parseFloat(fd.get('window')) || 10
        };
        await fetch(API + '/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg) });
        configCache = cfg;
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(poll, cfg.interval * 1000);
      });

      document.getElementById('svid-badge')?.addEventListener('click', openSvidModal);
      document.getElementById('btn-stop')?.addEventListener('click', async () => {
        await fetch(API + '/svid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ svid: null }) });
        document.getElementById('data-container')?.remove();
        poll();
      });
    }

    function openSvidModal() {
      fetch(API + '/data').then(r => r.json()).then(data => {
        const svids = data.svids || [];
        const modal = document.getElementById('modal');
        const list = document.getElementById('modal-svids');
        const current = data.svid;
        list.innerHTML = svids.length ? svids.map(s =>
          `<li class="${s === current ? 'selected' : ''}" data-svid="${s.replace(/"/g, '&quot;')}">${s}</li>`
        ).join('') : '<li style="cursor:default;color:var(--muted)">Aucun svID vu</li>';
        list.querySelectorAll('li[data-svid]').forEach(li => {
          li.addEventListener('click', async () => {
            const svid = li.getAttribute('data-svid');
            await fetch(API + '/svid', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ svid }) });
            modal.style.display = 'none';
            document.getElementById('data-container')?.remove();
            poll();
          });
        });
        document.getElementById('modal-close').onclick = () => { modal.style.display = 'none'; };
        modal.style.display = 'flex';
      });
    }

    async function poll() {
      try {
        const data = await fetchJson('/data');
        if (data.svid && document.getElementById('data-container')) {
          updateDataValues(data);
        } else {
          if (data.svid) configCache = await fetchJson('/config');
          render(data);
        }
      } catch (e) {
        document.getElementById('root').innerHTML = `<div class="panel"><p class="status waiting">Erreur: ${e.message}</p></div>`;
      }
    }

    poll();
    refreshTimer = setInterval(poll, (configCache.interval ?? 1) * 1000);
  </script>
</body>
</html>
