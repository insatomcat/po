<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MMS Subscriptions</title>
  <style>
    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --muted: #565f89;
      --accent: #7aa2f7;
      --danger: #f7768e;
      --success: #9ece6a;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      line-height: 1.5;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 1rem 0;
      color: var(--accent);
    }
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .btn {
      padding: 0.5rem 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
    }
    .btn:hover { filter: brightness(1.15); }
    .btn--accent { background: var(--accent); color: var(--bg); }
    .btn--danger { background: var(--danger); color: #fff; }
    .btn--small { padding: 0.35rem 0.6rem; font-size: 0.8rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td { padding: 0.6rem 0.75rem; text-align: left; }
    th {
      background: rgba(0,0,0,0.2);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
    }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .status { font-weight: 500; }
    .status.running { color: var(--success); }
    .status.error { color: var(--danger); }
    .status.stopped { color: var(--muted); }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }
    .error-msg { color: var(--danger); font-size: 0.85rem; }
    #loading { color: var(--muted); }
    .details-row td {
      background: #0f0f14;
      padding: 1rem 0.75rem;
      border-top: none;
      vertical-align: top;
    }
    .details-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.25rem 1rem;
      font-size: 0.85rem;
    }
    .details-grid dt { color: var(--muted); margin: 0; }
    .details-grid dd { margin: 0; }
    .rcb-list {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      max-height: 180px;
      overflow-y: auto;
      margin-top: 0.5rem;
    }
    .rcb-list li { margin: 0.15rem 0; }
    .recents-section {
      margin-top: 2rem;
      border-top: 1px solid var(--surface);
    }
    .recents-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0.75rem 0 0.5rem 0;
      color: var(--muted);
    }
    .recent-card {
      background: var(--surface);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .recent-card > .recent-details { flex-basis: 100%; }
    .recent-card .info { flex: 1; min-width: 120px; }
    .recent-card .actions { display: flex; gap: 0.5rem; }
    .recent-details { display: none; padding: 1rem; margin-top: 0.5rem; background: #0f0f14; border-radius: 6px; }
    .logs-section {
      margin-top: 2rem;
      border-top: 1px solid var(--surface);
    }
    .logs-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0.75rem 0 0.5rem 0;
      color: var(--muted);
    }
    #logs {
      background: #0f0f14;
      color: var(--text);
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      line-height: 1.4;
      padding: 0.75rem;
      border-radius: 6px;
      height: 21rem;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Flux MMS</h1>
  <div class="toolbar">
    <button type="button" class="btn btn--accent" id="refresh">Actualiser</button>
    <button type="button" class="btn btn--danger" id="purge">Tout supprimer</button>
    <span id="loading"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>Id</th>
        <th>Domaine</th>
        <th>IED</th>
        <th>Debug</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

  <section class="recents-section">
    <h2>Récents</h2>
    <div id="recents-list"></div>
  </section>

  <section class="logs-section">
    <h2>Logs (temps réel)</h2>
    <pre id="logs"></pre>
  </section>

  <script>
    const api = ''; // same origin

    async function subs() {
      const r = await fetch(api + '/subscriptions');
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    }

    async function recents() {
      const r = await fetch(api + '/recents');
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    }

    async function createSub(payload) {
      const r = await fetch(api + '/subscriptions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    }

    async function setDebug(id, debug) {
      const r = await fetch(api + '/subscriptions/' + encodeURIComponent(id), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ debug })
      });
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    }

    async function del(id) {
      const r = await fetch(api + '/subscriptions/' + encodeURIComponent(id), { method: 'DELETE' });
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    }

    async function purgeAll() {
      if (!confirm('Supprimer tous les flux ?')) return;
      const r = await fetch(api + '/subscriptions', { method: 'DELETE' });
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    }

    function detailsHtml(s) {
      const items = s.rcb_items || [];
      const rcbList = items.length
        ? '<ul class="rcb-list">' + items.map(r => '<li>' + escapeHtml(r) + '</li>').join('') + '</ul>'
        : '<span style="color:var(--muted)">(chargement en cours ou flux arrêté)</span>';
      const errBlock = s.last_error ? `<dt>Dernière erreur</dt><dd class="error-msg">${escapeHtml(s.last_error)}</dd>` : '';
      return `<dl class="details-grid">
        <dt>IED</dt><dd>${escapeHtml(s.ied_host)}:${s.ied_port}</dd>
        <dt>Domaine</dt><dd>${escapeHtml(s.domain)}</dd>
        <dt>SCL</dt><dd>${escapeHtml(s.scl) || '—'}</dd>
        <dt>RCB list</dt><dd>${escapeHtml(s.rcb_list) || 'liste intégrée'}</dd>
        <dt>Debug</dt><dd>${s.debug ? 'Oui' : 'Non'}</dd>
        <dt>Reports souscrits (${items.length})</dt><dd>${rcbList}</dd>
        ${errBlock}
      </dl>`;
    }

    function render(rows) {
      const tbody = document.getElementById('list');
      const expanded = new Set();
      tbody.querySelectorAll('.details-row').forEach(r => {
        if (r.style.display !== 'none') expanded.add(r.dataset.id);
      });
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Aucun flux.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map((s, idx) => {
        const rowId = 'row-' + idx;
        const isExp = expanded.has(s.id);
        return `<tr data-id="${escapeHtml(s.id)}">
          <td><strong>${escapeHtml(s.id)}</strong></td>
          <td>${escapeHtml(s.domain)}</td>
          <td>${escapeHtml(s.ied_host)}:${s.ied_port}</td>
          <td>${s.debug ? 'Oui' : 'Non'}</td>
          <td class="actions">
            <button type="button" class="btn btn--small" data-action="expand" data-id="${escapeHtml(s.id)}" data-rowid="${rowId}">${isExp ? 'Réduire' : 'Détails'}</button>
            <button type="button" class="btn btn--small" data-action="debug" data-id="${escapeHtml(s.id)}" data-debug="${!s.debug}">${s.debug ? 'Désactiver debug' : 'Activer debug'}</button>
            <button type="button" class="btn btn--small btn--danger" data-action="delete" data-id="${escapeHtml(s.id)}">Supprimer</button>
          </td>
        </tr>
        <tr class="details-row" id="${rowId}" data-id="${escapeHtml(s.id)}" style="display:${isExp ? 'table-row' : 'none'}"><td colspan="5">${detailsHtml(s)}</td></tr>`;
      }).join('');

      tbody.querySelectorAll('[data-action="expand"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const rowId = btn.dataset.rowid;
          const detailRow = document.getElementById(rowId);
          const id = btn.dataset.id;
          if (detailRow.style.display === 'none') {
            detailRow.style.display = 'table-row';
            btn.textContent = 'Réduire';
          } else {
            detailRow.style.display = 'none';
            btn.textContent = 'Détails';
          }
        });
      });
      tbody.querySelectorAll('[data-action="debug"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const debug = btn.dataset.debug === 'true';
          setLoading('Mise à jour…');
          try {
            await setDebug(id, debug);
            await load();
          } catch (e) {
            setLoading(e.message, true);
          }
        });
      });
      tbody.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Supprimer le flux "' + btn.dataset.id + '" ?')) return;
          setLoading('Suppression…');
          try {
            await del(btn.dataset.id);
            await load();
          } catch (e) {
            setLoading(e.message, true);
          }
        });
      });
    }

    let _recentsCache = [];

    function renderRecents(recentsData, runningIds) {
      const el = document.getElementById('recents-list');
      _recentsCache = recentsData || [];
      if (!_recentsCache.length) {
        el.innerHTML = '<p class="empty">Aucun flux récent.</p>';
        return;
      }
      const expanded = new Set();
      el.querySelectorAll('.recent-details').forEach(d => {
        if (d.style.display !== 'none') expanded.add(d.dataset.id);
      });
      el.innerHTML = _recentsCache.map((r, idx) => {
        const isRunning = runningIds.has(r.id);
        const detailId = 'recent-detail-' + idx;
        const isExp = expanded.has(r.id);
        return `<div class="recent-card" data-id="${escapeHtml(r.id)}">
          <div class="info">
            <strong>${escapeHtml(r.id)}</strong> — ${escapeHtml(r.domain)} @ ${escapeHtml(r.ied_host)}:${r.ied_port}
            ${isRunning ? ' <span class="status running">(en cours)</span>' : ''}
          </div>
          <div class="actions">
            <button type="button" class="btn btn--small" data-action="recent-expand" data-id="${escapeHtml(r.id)}" data-detailid="${detailId}">${isExp ? 'Réduire' : 'Détails'}</button>
            ${!isRunning ? `<button type="button" class="btn btn--small btn--accent" data-action="relancer" data-idx="${idx}">Relancer</button>` : ''}
          </div>
          <div class="recent-details" id="${detailId}" data-id="${escapeHtml(r.id)}" style="display:${isExp ? 'block' : 'none'};width:100%">${detailsHtml(r)}</div>
        </div>`;
      }).join('');

      el.querySelectorAll('[data-action="recent-expand"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const d = document.getElementById(btn.dataset.detailid);
          if (d.style.display === 'none') {
            d.style.display = 'block';
            btn.textContent = 'Réduire';
          } else {
            d.style.display = 'none';
            btn.textContent = 'Détails';
          }
        });
      });
      el.querySelectorAll('[data-action="relancer"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const idx = parseInt(btn.dataset.idx, 10);
          const r = _recentsCache[idx];
          if (!r) return;
          const p = { id: r.id, ied_host: r.ied_host, ied_port: r.ied_port, domain: r.domain, scl: r.scl || null, rcb_list: r.rcb_list || null, debug: r.debug };
          setLoading('Relance…');
          try {
            await createSub(p);
            await load();
          } catch (e) {
            setLoading(e.message, true);
          }
        });
      });
    }

    function escapeHtml(s) {
      if (s == null) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function setLoading(msg, isError) {
      const el = document.getElementById('loading');
      el.textContent = msg || '';
      el.style.color = isError ? 'var(--danger)' : 'var(--muted)';
    }

    async function load() {
      setLoading('Chargement…');
      try {
        const [subsData, recentsData] = await Promise.all([subs(), recents()]);
        render(subsData);
        const runningIds = new Set(subsData.map(s => s.id));
        renderRecents(recentsData, runningIds);
        setLoading('');
      } catch (e) {
        setLoading('Erreur: ' + e.message, true);
        document.getElementById('list').innerHTML = '<tr><td colspan="6" class="empty">Impossible de charger les flux.</td></tr>';
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('purge').addEventListener('click', async () => {
      setLoading('Purge…');
      try {
        await purgeAll();
        await load();
      } catch (e) {
        setLoading(e.message, true);
      }
    });

    const logsEl = document.getElementById('logs');
    const LOG_MAX = 500;
    const logLines = [];
    const es = new EventSource('logs');
    es.onmessage = (e) => {
      logLines.push(e.data);
      if (logLines.length > LOG_MAX) logLines.shift();
      logsEl.textContent = logLines.join('\n');
      logsEl.scrollTop = logsEl.scrollHeight;
    };
    // EventSource reconnecte automatiquement en cas d'erreur si on ne ferme pas

    load();
  </script>
</body>
</html>
